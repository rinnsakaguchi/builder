name: Release Build - android12-5.10

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        variant:
          - { name: "VNL", VARIANT: "VNL", LAST_BUILD: "false" }
          - { name: "KSU", VARIANT: "KSU", LAST_BUILD: "false" }
          - { name: "KSU SuSFS", VARIANT: "KSUS", LAST_BUILD: "true" }

    name: Build ${{ matrix.variant.name }} variant
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      VARIANT: ${{ matrix.variant.VARIANT}}
      LAST_BUILD: ${{ matrix.variant.LAST_BUILD }}
      TODO: "kernel"
      KERNEL_VERSION: "5.10"

  release:
    permissions:
      contents: write

    name: Create Unified Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files

      - name: Extract variables from info.txt (Safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Find the info.txt file
          info_file=$(find release_files -name "info.txt" -type f | head -1)

          if [[ -f "$info_file" ]]; then
            echo "Found info.txt at: $info_file"

            # Extract variables safely without using functions.sh
            while IFS='=' read -r key value; do
              # Skip empty lines and comments
              [[ -z "$key" || "$key" =~ ^#.*$ ]] && continue

              # Clean up whitespace
              key=$(echo "$key" | xargs)
              value=$(echo "$value" | xargs)

              # Validate that we have both key and value
              if [[ -n "$key" && -n "$value" ]]; then
                echo "Setting: $key=$value"
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done < "$info_file"

            echo "Variables extracted successfully"
          fi

      - name: Generate release tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
            RELEASE_TAG="$KERNEL_NAME-$RELEASE-$KVER"

            echo "Release tag: $RELEASE_TAG"
            echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Upload All Builds to release repo
        run: |
          sed -i "s/kirnal/$KERNEL_NAME/g" release.md
          sed -i "s/release/$RELEASE/g" release.md
          sed -i "s/kver/$KVER/g" release.md
          sed -i "s/linux_version/$LINUX_VERSION/g" release.md
          sed -i "s/susver/$SUSFS_VERSION/g" release.md

          gh release create "$RELEASE_TAG" \
            --repo "$RELEASE_REPO" \
            --title "$RELEASE $KVER" \
            --notes-file "release.md" \
            release_files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Send notification to TG (Safe)
        run: |
            MESSAGE="📦 Release completed! [Click](https://github.com/${{ env.RELEASE_REPO }}/releases/tag/${{ env.RELEASE_TAG }})"
            source functions.sh
            send_msg "$MESSAGE"
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
