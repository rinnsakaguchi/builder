name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      TODO:
        description: "Generate"
        default: "kernel"
        type: choice
        options:
          - "kernel"
          - "defconfig"
      kernelrepo:
        description: "Kernel Repository"
        default: "main"
        type: choice
        options:
          - "main"
          - "rama"
      TCPCONG:
        description: "TCP Congestion Control"
        default: "westwood"
        type: choice
        options:
          - "bbrplus"
          - "westwood"
      CLANGURL:
        description: "Select Clang Version"
        default: "12"
        type: choice
        options:
          - "12"
          - "19"
          - "20"
          - "22"
          - "neutron"
          - "gf-clang"
      LTOBUILD:
        description: "Setup LTO"
        default: "full"
        type: choice
        options:
          - "full"
          - "thin"
      VARIANT:
        description: "Kernel Variants"
        default: "SUSFS"
        type: choice
        options:
          - "VNL"
          - "KSU"
          - "SUSFS"
          - "ALL"
      CONFIGHZ:
        description: "Custom HZ"
        default: "300"
        type: choice
        options:
          - "250"
          - "300"
      build_type:
        description: "Build type"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - release
      KERNELBRANCH:
        description: "Kernel Branch (Main Repo)"
        required: true
        default: "lts"
        type: choice
        options:
          - lts
          - test
          - Kinosaki
          - android12-5.10
          - android12-5.10-staging
      KERNELNAME:
        description: "Kernel Name"
        default: "Kinosaki"
        type: string

env:
  MAN_DISABLE: true
  DEBIAN_FRONTEND: noninteractive
  BASE_NAME: Kinosaki
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ inputs.VARIANT == 'ALL' && fromJson('["KSU","VNL","SUSFS"]') || fromJson(format('["{0}"]', inputs.VARIANT || 'SUSFS')) }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      - name: Setup Swap 20GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev dwarves cpio aria2 zip unzip libxml2 libxml2-dev device-tree-compiler build-essential gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          pip install lxml

      - name: Run Build Script
        env:
          VARIANT: ${{ matrix.variant }}
          KERNEL_NAME: ${{ inputs.KERNELNAME || 'Kinosaki' }}
          REPONYA: ${{ inputs.kernelrepo || 'main' }}
          LTOBUILD: ${{ inputs.LTOBUILD || 'thin' }}
          CLANGURL: ${{ inputs.CLANGURL || 'gf-clang' }}
          TCPCONG: ${{ inputs.TCPCONG || 'westwood' }}
          CONFIGHZ: ${{ inputs.CONFIGHZ || '250' }}
          KERNELBRANCH: ${{ inputs.KERNELBRANCH || 'test' }}
          TODO: ${{ inputs.TODO || 'kernel' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x *.sh
          if [ -d "py" ]; then chmod +x py/*.py; fi
          ./build.sh

      - name: Upload Intermediary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: artifacts/*.zip

    release:
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'release' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Matrix Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: kernel-*
          merge-multiple: true

      - name: Create Unified GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE=$(date +"%Y%m%d")
          KERNEL_NAME="${{ inputs.KERNELNAME || 'Kinosaki' }}"
          RELEASE_TAG="${KERNEL_NAME}-${BUILD_DATE}"
          
          echo "Creating Release Tag: $RELEASE_TAG"

          gh release create "$RELEASE_TAG" \
            --repo "rinnsakaguchi/GKI-Release" \
            --title "$KERNEL_NAME | $BUILD_DATE" \
            --notes "Automated release build for $KERNEL_NAME branches." || true
            
          # Keep a brief delay to let the GitHub API sync
          sleep 3
            
          # Upload all extracted ZIP variants
          gh release upload "$RELEASE_TAG" all-artifacts/*.zip \
            --repo "rinnsakaguchi/GKI-Release" \
            --clobber

      - name: Send Release Notification to Telegram
        run: |
          BUILD_DATE=$(date +"%Y%m%d")
          RELEASE_TAG="${{ inputs.KERNELNAME || 'Kinosaki' }}-${BUILD_DATE}"
          RELEASE_URL="https://github.com/rinnsakaguchi/GKI-Release/releases/tag/$RELEASE_TAG"
          
          MSG="🚀 *Unified Release Published!*%0A%0A📱 *Kernel*: \`${{ inputs.KERNELNAME || 'Kinosaki' }}\`%0A🔖 *Tag*: \`$RELEASE_TAG\`%0A%0A🔗 [Download All Variants Here]($RELEASE_URL)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=markdown" \
            -d "text=$MSG"

  notify-test:
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type != 'release' && always() }}
    steps:
      - name: Send Test Completion Notification
        run: |
          MSG="✅ *Test Build Completed!*%0A%0A📱 *Kernel*: \`${{ inputs.KERNELNAME || 'Kinosaki' }}\`%0A📦 Check your Telegram channel/thread for individual zip deliveries."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "message_thread_id=7" \
            -d "parse_mode=markdown" \
            -d "text=$MSG"
