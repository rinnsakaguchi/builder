name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      TODO:
        description: "Action to perform"
        default: "kernel"
        type: choice
        options:
          - "kernel"
          - "defconfig"
      kernelrepo:
        description: "Kernel Repository"
        default: "main"
        type: choice
        options:
          - "main"
          - "rama"
      TCPCONG:
        description: "TCP Congestion Control"
        default: "westwood"
        type: choice
        options:
          - "bbrplus"
          - "westwood"
      CLANGURL:
        description: "Select Clang Version"
        default: "12"
        type: choice
        options:
          - "12"
          - "19"
          - "20"
          - "22"
          - "neutron"
          - "gf-clang"
      LTOBUILD:
        description: "Setup LTO"
        default: "full"
        type: choice
        options:
          - "full"
          - "thin"
      VARIANT:
        description: "Kernel Variants"
        default: "SUSFS"
        type: choice
        options:
          - "VNL"
          - "KSU"
          - "SUSFS"
          - "ALL"
      CONFIGHZ:
        description: "Custom HZ"
        default: "300"
        type: choice
        options:
          - "250"
          - "300"
      build_type:
        description: "Build type"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - release
      KERNELBRANCH:
        description: "Kernel Branch (Main Repo)"
        required: true
        default: "lts"
        type: choice
        options:
          - lts
          - test
          - Kinosaki
          - android12-5.10
          - android12-5.10-staging
      KERNELNAME:
        description: "Kernel Name"
        default: "Kinosaki"
        type: string

env:
  MAN_DISABLE: true
  DEBIAN_FRONTEND: noninteractive
  BASE_NAME: Kinosaki
  BUILD_TYPE: ${{ github.event.inputs.build_type }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ inputs.VARIANT == 'ALL' && fromJson('["KSU","VNL","SUSFS"]') || fromJson(format('["{0}"]', inputs.VARIANT || 'SUSFS')) }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup GitHub CLI Auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      - name: Setup Swap 20GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev dwarves cpio aria2 zip unzip libxml2 libxml2-dev device-tree-compiler build-essential gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          pip install lxml

      - name: Run Build Script
        env:
          VARIANT: ${{ matrix.variant }}
          KERNEL_NAME: ${{ inputs.KERNELNAME || 'Kinosaki' }}
          REPONYA: ${{ inputs.kernelrepo || 'main' }}
          LTOBUILD: ${{ inputs.LTOBUILD || 'full' }}
          CLANGURL: ${{ inputs.CLANGURL || '12' }}
          TCPCONG: ${{ inputs.TCPCONG || 'westwood' }}
          CONFIGHZ: ${{ inputs.CONFIGHZ || '300' }}
          KERNELBRANCH: ${{ inputs.KERNELBRANCH || 'lts' }}
          TODO: ${{ inputs.TODO || 'kernel' }}
        run: |
          chmod +x *.sh
          if [ -d "py" ]; then chmod +x py/*.py; fi
          ./build.sh

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: artifacts/*

  notify:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Final Notification
        run: |
          RELEASE_TAG="${{ inputs.KERNELNAME || 'Kinosaki' }}-$(date +%Y%m%d)"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
          MSG="🚀 *Build Completed!*%0A%0A📱 *Kernel*: \`${{ inputs.KERNELNAME || 'Kinosaki' }}\`%0A🔖 *Tag*: \`$RELEASE_TAG\`%0A%0A🔗 [Download on GitHub]($RELEASE_URL)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=markdown" \
            -d "text=$MSG"
